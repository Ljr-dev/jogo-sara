<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🏄 Super Mario - Jogo da Sara</title>
<link rel="stylesheet" href="css/style.css">
<style>
html,body{overflow:hidden;background:#5c94fc}
.game-page{background:#5c94fc}
</style>
</head>
<body>
<div class="game-page" style="display:flex">
  <div class="game-top">
    <a class="back-btn" href="index.html">✕</a>
    <span class="gt-title">🍄 SUPER MARIO</span>
    <span class="gt-score" id="runnerScore">0</span>
  </div>
  <div class="game-area" style="padding:0;background:#5c94fc" id="runnerArea">
    <canvas id="runnerCanvas"></canvas>
    <div class="runner-hint">👆 TOQUE PARA PULAR!</div>
    <div class="runner-overlay" id="runnerOverlay">
      <div class="ro-title" id="runnerTitle">🍄 SUPER MARIO</div>
      <div class="ro-score" id="runnerFinalScore">PONTOS: 0</div>
      <button class="ro-btn" onclick="startRunner()">▶ JOGAR</button>
    </div>
  </div>
</div>
<div class="celebration" id="celebration"></div>
<script src="js/shared.js"></script>
<script src="js/runner.js"></script>
</body>
</html>
