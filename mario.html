<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🍄 Super Mario World - Jogo da Sara</title>
<link rel="stylesheet" href="css/style.css">
<style>
html,body{overflow:hidden;background:#000;width:100%;height:100%}
#marioCanvas{display:block;width:100%;height:100%;touch-action:none}
.game-page{background:#5c94fc}
.mario-hud{position:absolute;top:0;left:0;right:0;padding:8px 12px;display:flex;justify-content:space-between;z-index:5;pointer-events:none;font-family:Arial,sans-serif}
.mario-hud span{color:#fff;font-weight:900;font-size:clamp(12px,2.5vw,18px);text-shadow:2px 2px 0 rgba(0,0,0,.5)}
/* D-Pad + Buttons */
.controls{position:absolute;bottom:0;left:0;right:0;height:180px;z-index:10;pointer-events:none;display:flex;justify-content:space-between;padding:0 10px 16px;align-items:flex-end}
.dpad{display:grid;grid-template-columns:56px 56px 56px;grid-template-rows:56px 56px 56px;gap:2px;pointer-events:auto}
.dpad-btn{width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,.25);border:2px solid rgba(255,255,255,.3);color:#fff;font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
.dpad-btn:active{background:rgba(255,255,255,.4);transform:scale(.92)}
.dpad-blank{visibility:hidden}
.action-btns{display:flex;gap:10px;pointer-events:auto;align-items:flex-end}
.abtn,.bbtn{width:64px;height:64px;border-radius:50%;color:#fff;font-weight:900;font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:3px solid rgba(255,255,255,.3);-webkit-tap-highlight-color:transparent;user-select:none}
.abtn{background:rgba(0,200,0,.35);margin-bottom:10px}
.bbtn{background:rgba(200,0,0,.35)}
.abtn:active,.bbtn:active{transform:scale(.9)}
.down-btn{width:56px;height:30px;border-radius:8px;background:rgba(255,255,255,.25);border:2px solid rgba(255,255,255,.3);color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;pointer-events:auto}
.down-btn:active{background:rgba(255,255,255,.4)}
/* Overlay */
.mario-overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.75);z-index:20;gap:8px}
.mario-overlay.hidden{display:none}
.mario-overlay .mo-title{font-size:clamp(24px,5vw,40px);font-weight:900;color:#FFE600;text-shadow:2px 2px 0 rgba(0,0,0,.3);text-align:center}
.mario-overlay .mo-sub{font-size:clamp(14px,2.5vw,20px);color:#fff;text-align:center}
.mario-overlay .mo-btn{padding:10px 30px;border-radius:14px;border:none;background:#FFE600;color:#1a1a2e;font-size:clamp(16px,3vw,22px);font-weight:900;cursor:pointer;pointer-events:auto}
.mario-overlay .mo-btn:active{transform:scale(.9)}
.world-select{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:380px;pointer-events:auto}
.world-btn{width:70px;height:70px;border-radius:12px;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;font-size:11px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.world-btn:active{transform:scale(.9)}
.world-btn.locked{opacity:.4;cursor:default}
.world-btn .wb-icon{font-size:22px}
</style>
</head>
<body>
<div class="game-page" style="display:flex;position:relative">
  <div class="game-top" style="z-index:30">
    <a class="back-btn" href="index.html">✕</a>
    <span class="gt-title">🍄 SUPER MARIO WORLD</span>
    <span class="gt-score" id="marioScore">0</span>
  </div>
  <div style="flex:1;position:relative;overflow:hidden;background:#5c94fc">
    <canvas id="marioCanvas"></canvas>
    <div class="mario-hud">
      <span id="marioLives">❤️ 3</span>
      <span id="marioCoins">🪙 0</span>
      <span id="marioWorld">MUNDO 1-1</span>
    </div>
    
    <!-- Touch Controls -->
    <div class="controls" id="touchControls">
      <div class="dpad">
        <div class="dpad-blank"></div>
        <div class="dpad-btn" id="btnUp">▲</div>
        <div class="dpad-blank"></div>
        <div class="dpad-btn" id="btnLeft">◀</div>
        <div class="dpad-btn" id="btnDown" style="background:rgba(255,255,255,.15)">▼</div>
        <div class="dpad-btn" id="btnRight">▶</div>
        <div class="dpad-blank"></div>
        <div class="dpad-btn" id="btnJump" style="background:rgba(0,200,0,.25)">A</div>
        <div class="dpad-blank"></div>
      </div>
      <div class="action-btns">
        <div class="abtn" id="btnAttack" style="background:rgba(200,50,0,.35);width:56px;height:56px;font-size:18px">⚡</div>
      </div>
    </div>
    
    <!-- Overlay -->
    <div class="mario-overlay" id="marioOverlay">
      <div class="mo-title" id="marioTitle">🍄 SUPER MARIO</div>
      <div class="mo-sub" id="marioSub">WORLD</div>
      <div class="world-select" id="worldSelect"></div>
      <button class="mo-btn" id="marioStartBtn">▶ INICIAR</button>
    </div>
  </div>
</div>
<div class="celebration" id="celebration"></div>
<script src="js/shared.js"></script>
<script src="js/mario.js"></script>
</body>
</html>
